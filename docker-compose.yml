services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Gravées dans le bundle au build — pas de secrets ici
        NEXT_PUBLIC_API_URL:       ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_S3_BASE_URL:   ${NEXT_PUBLIC_S3_BASE_URL}
        NEXT_PUBLIC_SITE_URL:      ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SITE_NAME:     ${NEXT_PUBLIC_SITE_NAME}
        NEXT_PUBLIC_MAPBOX_TOKEN:  ${NEXT_PUBLIC_MAPBOX_TOKEN}
    ports:
      - "3000:3000"
    environment:
      # Secrets injectés au runtime
      - API_KEY=${API_KEY}
      - API_TOKEN=${API_TOKEN}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - REDIS_URL=${REDIS_URL}
    # Permet au conteneur de joindre un backend/Redis tournant sur la machine hôte
    # via http://host.docker.internal:PORT (sinon "localhost" = le conteneur lui-même)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
