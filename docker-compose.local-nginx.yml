# ─────────────────────────────────────────────────────────────────────────────
# Architecture complète EN LOCAL : nginx (conteneur) → frontend Next.js
#
# Lancer :  docker compose -f docker-compose.local-nginx.yml --env-file .env.docker up -d --build
# Accès  :  http://localhost:8090   (via nginx — le frontend n'est PAS exposé directement)
# Arrêter:  docker compose -f docker-compose.local-nginx.yml --env-file .env.docker down
#
# nginx est sur 8090 pour ne pas entrer en collision avec le backend (8080) ni le 3000.
# ─────────────────────────────────────────────────────────────────────────────
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:       ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_S3_BASE_URL:   ${NEXT_PUBLIC_S3_BASE_URL}
        NEXT_PUBLIC_SITE_URL:      ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SITE_NAME:     ${NEXT_PUBLIC_SITE_NAME}
        NEXT_PUBLIC_MAPBOX_TOKEN:  ${NEXT_PUBLIC_MAPBOX_TOKEN}
    environment:
      - API_KEY=${API_KEY}
      - API_TOKEN=${API_TOKEN}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - CACHE_INVALIDATE_SECRET=${CACHE_INVALIDATE_SECRET}
      - REDIS_URL=${REDIS_URL}
    # Joindre un backend tournant sur la machine hôte via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Pas de port publié : joignable uniquement par nginx sur le réseau Docker
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
    ports:
      - "8090:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
