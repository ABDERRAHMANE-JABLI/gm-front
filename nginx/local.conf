# nginx LOCAL (conteneur) → proxifie vers le conteneur frontend via le réseau Docker.
# Pas de TLS (HTTP only) — uniquement pour tester l'archi nginx → Next en local.
# Headers proxy inline (pas d'include) pour éviter les soucis de bind-mount WSL2.

server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss image/svg+xml;

    client_max_body_size 20m;

    # $http_host conserve le port (localhost:8090) — requis pour la vérif CSRF
    # des Server Actions de Next (Origin vs X-Forwarded-Host).
    proxy_http_version 1.1;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header Connection        "";

    location /_next/static/ {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://frontend:3000;
    }
}
