# ─────────────────────────────────────────────────────────────────────────────
# nginx — reverse proxy devant Next.js (standalone, 127.0.0.1:3000)
# À copier sur le VPS dans /etc/nginx/sites-available/gaultmillau puis :
#   ln -s /etc/nginx/sites-available/gaultmillau /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# TLS : générer le certificat avec  certbot --nginx -d gaultmillau.ma -d www.gaultmillau.ma
# ─────────────────────────────────────────────────────────────────────────────

# Limiteur de débit pour les routes /api (anti-bruteforce / abus)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream nextjs_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP : redirige tout vers HTTPS (sauf le challenge ACME) ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name gaultmillau.ma www.gaultmillau.ma;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gaultmillau.ma www.gaultmillau.ma;

    # Certificats (chemins certbot par défaut)
    ssl_certificate     /etc/letsencrypt/live/gaultmillau.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gaultmillau.ma/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Taille max des uploads (commande, etc.)
    client_max_body_size 2m;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss image/svg+xml application/font-woff2;

    # ── Assets statiques Next : cache long, immutables ──
    location /_next/static/ {
        proxy_pass http://nextjs_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        proxy_pass http://nextjs_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Routes API : rate-limité ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://nextjs_frontend;
        include /etc/nginx/proxy_params_nextjs;
    }

    # ── Reste de l'app ──
    location / {
        proxy_pass http://nextjs_frontend;
        include /etc/nginx/proxy_params_nextjs;
    }
}
